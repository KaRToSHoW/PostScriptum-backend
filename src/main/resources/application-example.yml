server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:psportal;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: REPLACE_WITH_YOUR_SECRET_MIN_32_CHARS
    expiration-ms: 86400000   # 24 часа

cors:
  allowed-origins: http://localhost:5173
